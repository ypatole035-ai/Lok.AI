name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & sign release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      # FIX: Same as debug — use the proper Gradle action instead of curl-ing the jar
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      # FIX: Added llama.cpp CMake cache (was missing from release workflow)
      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ${{ runner.os }}-ndk27-cmake-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: ${{ runner.os }}-ndk27-cmake-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Gradle memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.workers.max=2" >> ~/.gradle/gradle.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > lokai-release.keystore

      - name: Build release APK
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/lokai-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --max-workers=2
        
      - name: Rename APK with version tag
        run: |
          TAG="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/Lok.AI-${TAG}.apk"

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/## \[${TAG#v}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for full release notes."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lok.AI ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: app/build/outputs/apk/release/Lok.AI-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
